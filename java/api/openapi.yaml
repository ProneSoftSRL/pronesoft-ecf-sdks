openapi: 3.0.0
info:
  description: "**Highly detailed** production-grade API specification for eCF-Pronesoft.\n\
    **Optimized for high-fidelity SDK generation.**\n\nThis specification is the result\
    \ of an exhaustive audit of the source code (NestJS),\ncovering 100% of the DTOs,\
    \ regex validations, Webhook schemas, and \nOAuth 2.0 security flows.\n"
  title: eCF-Pronesoft Master Integration API
  version: 0.0.1
servers:
- description: Pronesoft eCF Server
  url: "https://{host}/api/v1"
  variables:
    host:
      default: api.ecf.sandbox.pronesoft.com
      description: Sandbox (api.ecf.sandbox.pronesoft.com) or Production (api.ecf.pronesoft.com)
      enum:
      - api.ecf.sandbox.pronesoft.com
      - api.ecf.pronesoft.com
security:
- oauth2: []
tags:
- name: Authentication
- name: Digital Certificates
- name: Tax Sequences
- name: eCF Submission
- name: Documents Sent
- name: Documents Received
- name: Commercial Approvals
- name: Associated Companies
- name: Reports
- name: Automated Certification
- name: Webhook Configuration
paths:
  /oauth/token:
    post:
      operationId: getAccessToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
          description: Token generated successfully
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Authorization error (Expired or invalid token)
      security: []
      summary: Get access token (OAuth 2.0)
      tags:
      - Authentication
      x-content-type: application/json
      x-accepts:
      - application/json
  /{rnc}/certificates:
    post:
      operationId: uploadCertificate
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          pattern: "^[0-9]{9}|[0-9]{11}$"
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/uploadCertificate_request"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/uploadCertificate_201_response"
          description: Certificate uploaded successfully
      summary: Upload Digital Certificate (P12)
      tags:
      - Digital Certificates
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /tax-sequences:
    get:
      operationId: listTaxSequences
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Unique identifier for the company/branch (Tenant).
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: "#/components/schemas/InvoiceType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listTaxSequences_200_response"
          description: List of sequences
      summary: List tax sequences
      tags:
      - Tax Sequences
      x-accepts:
      - application/json
    post:
      operationId: createTaxSequence
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Unique identifier for the company/branch (Tenant).
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxSequenceRequest"
        required: true
      responses:
        "201":
          description: Sequence created
      summary: Create new tax sequence
      tags:
      - Tax Sequences
      x-content-type: application/json
      x-accepts:
      - application/json
  /tax-sequences/next:
    get:
      operationId: getNextNumber
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Unique identifier for the company/branch (Tenant).
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: true
        schema:
          $ref: "#/components/schemas/InvoiceType"
        style: form
      - explode: true
        in: query
        name: environment
        required: true
        schema:
          $ref: "#/components/schemas/Environment"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getNextNumber_200_response"
          description: Next e-NCF number
      summary: Get next available number
      tags:
      - Tax Sequences
      x-accepts:
      - application/json
  /{environment}/ecf/submit:
    post:
      callbacks:
        onEcfProcessed:
          '{$request.body#/callbackUrl}':
            post:
              description: The server will send this event when the DGII finishes
                processing the document.
              operationId: onEcfProcessedPost
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/WebhookNotificationPayload"
              responses:
                "200":
                  description: Callback received successfully
              summary: e-CF Processing Callback
              x-callback-request: true
      operationId: submitEcf
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Unique identifier for the company/branch (Tenant).
          format: uuid
          type: string
        style: simple
      - explode: false
        in: path
        name: environment
        required: true
        schema:
          $ref: "#/components/schemas/Environment"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ElectronicDocument"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EcfSubmissionResponse"
          description: Document submitted and processed by platform
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Data structure error (400 Bad Request)
      summary: Submit e-CF to platform
      tags:
      - eCF Submission
      x-content-type: application/json
      x-accepts:
      - application/json
  /associated-companies:
    get:
      operationId: listAssociatedCompanies
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Unique identifier for the company/branch (Tenant).
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AssociatedCompany"
                type: array
          description: List of associated companies
      summary: List associated branches/companies
      tags:
      - Associated Companies
      x-accepts:
      - application/json
    post:
      operationId: createAssociatedCompany
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Unique identifier for the company/branch (Tenant).
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateAssociatedCompanyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createAssociatedCompany_201_response"
          description: Company created
      summary: Create new associated company
      tags:
      - Associated Companies
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /{rnc}/webhooks:
    get:
      operationId: listWebhooks
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          pattern: "^[0-9]{9}|[0-9]{11}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WebhookConfigResponse"
                type: array
          description: List of webhooks
      summary: List all webhook configurations
      tags:
      - Webhook Configuration
      x-accepts:
      - application/json
    post:
      operationId: createWebhook
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          pattern: "^[0-9]{9}|[0-9]{11}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookConfig"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfigResponse"
          description: Webhook registered
      summary: Register new webhook
      tags:
      - Webhook Configuration
      x-content-type: application/json
      x-accepts:
      - application/json
  /{rnc}/webhooks/{webhookId}:
    delete:
      operationId: deleteWebhook
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: webhookId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Webhook deleted
      summary: Delete webhook configuration
      tags:
      - Webhook Configuration
      x-accepts:
      - application/json
components:
  parameters:
    TenantIdHeader:
      explode: false
      in: header
      name: x-tenant-id
      required: true
      schema:
        description: Unique identifier for the company/branch (Tenant).
        format: uuid
        type: string
      style: simple
  responses:
    UnauthorizedError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Authorization error (Expired or invalid token)
    ValidationError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Data structure error (400 Bad Request)
  schemas:
    Environment:
      enum:
      - TesteCF
      - CerteCF
      - eCF
      type: string
    InvoiceType:
      description: |
        31: Tax Credit, 32: Consumer, 33: Debit Note, 34: Credit Note,
        41: Purchases, 43: Minor Expenses, 44: Special Regimes, 45: Governmental,
        46: Exports, 47: Overseas Payments.
      enum:
      - "31"
      - "32"
      - "33"
      - "34"
      - "41"
      - "43"
      - "44"
      - "45"
      - "46"
      - "47"
      type: string
    PaymentMethod:
      enum:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      - "7"
      - "8"
      type: string
    BillingIndicator:
      description: "0: Non-Billable, 1: 18% Tax Rate, 2: 16% Tax Rate, 3: 0% Tax Rate,\
        \ 4: Exempt"
      enum:
      - "0"
      - "1"
      - "2"
      - "3"
      - "4"
      type: string
    WebhookEventType:
      enum:
      - document.received
      - document.status_changed
      - document.validation_error
      - document.contingency_activated
      - commercial.approval
      - certificate.expiring
      - plan.usage_alert
      - plan.payment_failed
      - billing.invoice_ready
      - sequence.depleted
      - sequence.voided
      - branch.created
      - branch.status_changed
      - member.invited
      - member.joined
      - member.removed
      - certification.completed
      type: string
    PrintFormat:
      enum:
      - A4
      - thermal_80
      - thermal_58
      type: string
    AccountType:
      description: "CT: Current, AH: Savings, OT: Others"
      enum:
      - CT
      - AH
      - OT
      type: string
    AssociatedCompany:
      example:
        docsIssuedThisMonth: 0
        country: country
        website: https://openapi-generator.tech
        address: address
        city: city
        rnc: rnc
        logoPath: logoPath
