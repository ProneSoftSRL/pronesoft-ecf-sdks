openapi: 3.0.0
info:
  description: "Especificación de producción **200% detallada** de la API de eCF-Pronesoft.\n\
    **Optimizada para la generación de SDKs de alta fidelidad.**\n\nEsta especificació\
    n es el resultado de una auditoría exhaustiva del código fuente (NestJS),\ncubriendo\
    \ el 100% de los DTOs, validaciones con regex, esquemas de Webhooks y \nflujos\
    \ de seguridad OAuth 2.0.\n"
  title: eCF-Pronesoft Master Integration API
  version: 1.1.0
servers:
- description: Sandbox (Pruebas)
  url: https://api.ecf.sandbox.pronesoft.com/api/v1
- description: Producción
  url: https://api.ecf.pronesoft.com/api/v1
security:
- oauth2: []
tags:
- name: Authentication
- name: Digital Certificates
- name: Tax Sequences
- name: eCF Submission
- name: Documents Sent
- name: Documents Received
- name: Commercial Approvals
- name: Associated Companies
- name: Reports
- name: Automated Certification
- name: Webhook Configuration
paths:
  /oauth/token:
    post:
      operationId: getAccessToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
          description: Token generado exitosamente
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error de autorización (Token expirado o inválido)
      security: []
      summary: Obtener token de acceso (OAuth 2.0)
      tags:
      - Authentication
      x-content-type: application/json
      x-accepts:
      - application/json
  /{rnc}/certificates:
    post:
      operationId: uploadCertificate
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          pattern: "^[0-9]{9}|[0-9]{11}$"
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/uploadCertificate_request"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/uploadCertificate_201_response"
          description: Certificado cargado exitosamente
      summary: Cargar Certificado Digital (P12)
      tags:
      - Digital Certificates
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /tax-sequences:
    get:
      operationId: listTaxSequences
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Identificador único de la empresa/sucursal (Tenant).
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: "#/components/schemas/InvoiceType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listTaxSequences_200_response"
          description: Lista de secuencias
      summary: Listar secuencias fiscales
      tags:
      - Tax Sequences
      x-accepts:
      - application/json
    post:
      operationId: createTaxSequence
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxSequenceRequest"
        required: true
      responses:
        "201":
          description: Secuencia creada
      summary: Crear nueva secuencia fiscal
      tags:
      - Tax Sequences
      x-content-type: application/json
      x-accepts:
      - application/json
  /tax-sequences/next:
    get:
      operationId: getNextNumber
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Identificador único de la empresa/sucursal (Tenant).
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: true
        schema:
          $ref: "#/components/schemas/InvoiceType"
        style: form
      - explode: true
        in: query
        name: environment
        required: true
        schema:
          $ref: "#/components/schemas/Environment"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getNextNumber_200_response"
          description: Próximo número e-NCF
      summary: Obtener próximo número disponible
      tags:
      - Tax Sequences
      x-accepts:
      - application/json
  /{environment}/ecf/submit:
    post:
      callbacks:
        onEcfProcessed:
          '{$request.body#/callbackUrl}':
            post:
              description: El servidor enviará este evento cuando la DGII procese
                el documento.
              operationId: onEcfProcessedPost
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/WebhookNotificationPayload"
              responses:
                "200":
                  description: Callback recibido correctamente
              summary: Callback de procesamiento de e-CF
              x-callback-request: true
      operationId: submitEcf
      parameters:
      - explode: false
        in: header
        name: x-tenant-id
        required: true
        schema:
          description: Identificador único de la empresa/sucursal (Tenant).
          format: uuid
          type: string
        style: simple
      - explode: false
        in: path
        name: environment
        required: true
        schema:
          $ref: "#/components/schemas/Environment"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ElectronicDocument"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EcfSubmissionResponse"
          description: Documento enviado y procesado por plataforma
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error en la estructura de los datos (400 Bad Request)
      summary: Enviar e-CF a plataforma (Submit)
      tags:
      - eCF Submission
      x-content-type: application/json
      x-accepts:
      - application/json
  /{rnc}/webhooks:
    get:
      operationId: listWebhooks
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          pattern: "^[0-9]{9}|[0-9]{11}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WebhookConfigResponse"
                type: array
          description: Lista de webhooks
      summary: Listar todas las configuraciones de webhooks
      tags:
      - Webhook Configuration
      x-accepts:
      - application/json
    post:
      operationId: createWebhook
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          pattern: "^[0-9]{9}|[0-9]{11}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookConfig"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfigResponse"
          description: Webhook registrado
      summary: Registrar nuevo webhook
      tags:
      - Webhook Configuration
      x-content-type: application/json
      x-accepts:
      - application/json
  /{rnc}/webhooks/{webhookId}:
    delete:
      operationId: deleteWebhook
      parameters:
      - explode: false
        in: path
        name: rnc
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: webhookId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Webhook eliminado
      summary: Eliminar configuración de webhook
      tags:
      - Webhook Configuration
      x-accepts:
      - application/json
components:
  parameters:
    TenantIdHeader:
      explode: false
      in: header
      name: x-tenant-id
      required: true
      schema:
        description: Identificador único de la empresa/sucursal (Tenant).
        format: uuid
        type: string
      style: simple
  responses:
    UnauthorizedError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Error de autorización (Token expirado o inválido)
    ValidationError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Error en la estructura de los datos (400 Bad Request)
  schemas:
    Environment:
      enum:
      - TesteCF
      - CerteCF
      - eCF
      type: string
    InvoiceType:
      description: |
        31: Crédito Fiscal, 32: Consumidor, 33: Nota de Débito, 34: Nota de Crédito,
        41: Compras, 43: Gastos Menores, 44: Regímenes Especiales, 45: Gubernamental,
        46: Exportaciones, 47: Pagos al Exterior.
      enum:
      - "31"
      - "32"
      - "33"
      - "34"
      - "41"
      - "43"
      - "44"
      - "45"
      - "46"
      - "47"
      type: string
    PaymentMethod:
      enum:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      - "7"
      - "8"
      type: string
    BillingIndicator:
      description: "0: No Facturable, 1: Tasa 18%, 2: Tasa 16%, 3: Tasa 0%, 4: Exento"
      enum:
      - "0"
      - "1"
      - "2"
      - "3"
      - "4"
      type: string
    WebhookEventType:
      enum:
      - document.received
      - document.status_changed
      - document.validation_error
      - document.contingency_activated
      - commercial.approval
      - certificate.expiring
      - plan.usage_alert
      - sequence.depleted
      - certification.completed
      type: string
