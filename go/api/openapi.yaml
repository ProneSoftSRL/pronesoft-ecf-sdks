openapi: 3.0.0
info:
  contact:
    email: support@pronesoft.com
    name: Pronesoft SRL Support
    url: https://pronesoft.com
  description: |
    ## Overview
    Production-grade API for issuing Electronic Tax Receipts (e-CF) in the
    Dominican Republic through the Pronesoft platform.

    ## Authentication — OAuth 2.0 Client Credentials

    ### Steps
    1. Get credentials from the portal:
       - Sandbox: https://ecf.sandbox.pronesoft.com -> Apps -> Default Sandbox App
       - Production: https://ecf.pronesoft.com -> Integrations -> Apps -> Create App
    2. Request a token via POST /oauth/token — valid for 24 hours (86400s).
    3. Use: Authorization: Bearer <accessToken> on every request.
    4. Renew on HTTP 401. Best practice: renew 5 minutes before expiry.

    ### Multi-company delegation
    To act on behalf of an associated company (branch), add:
      x-tenant-id: <business-uuid>
    Do NOT send x-tenant-id when acting as the main company.

    ### Sandbox specifics
    - Use any RNC starting with SBX (e.g. SBX123456) — no real certificate needed.
    - Sequences are automatic — no need to create them manually.
    - The environment field in the document body MUST be TesteCF.

    ### Scopes
    business:read, business:create, business:update,
    members:read, members:invite, members:revoke,
    certificates:read, certificates:upload, certificates:update,
    documents:read, documents:create, documents:send, documents:receive, documents:update,
    approvals:read, approvals:commercial,
    sequences:read, sequences:create, sequences:update, sequences:cancel,
    business_info:read, certification:read, certification:write, reports:read
  license:
    name: Proprietary
    url: https://pronesoft.com/terms
  title: eCF-Pronesoft Integration API
  version: 1.1.0
externalDocs:
  description: Pronesoft eCF SDKs Repository
  url: https://github.com/ProneSoftSRL/pronesoft-ecf-sdks
servers:
- description: Sandbox — development and testing
  url: https://api.ecf.sandbox.pronesoft.com/api/v1
- description: Production — live e-CF issuance
  url: https://api.ecf.pronesoft.com/api/v1
security:
- bearerAuth: []
tags:
- description: OAuth 2.0 token endpoint. No Authorization header needed here. Tokens
    are valid for 24 hours.
  name: Authentication
- description: Upload and manage DGII digital signing certificates (P12/PFX format).
  name: Digital Certificates
- description: Manage e-NCF fiscal number sequences (E31-E47). Automatic in Sandbox.
  name: Tax Sequences
- description: Core endpoint for submitting e-CF documents to DGII via Pronesoft.
  name: eCF Submission
- description: "Query, download, and get statistics on submitted documents."
  name: Documents Sent
- description: Manage and query e-CF documents received from third parties.
  name: Documents Received
- description: Manage internal commercial approval workflows for received documents.
  name: Commercial Approvals
- description: Manage branches and associated companies under your main account.
  name: Associated Companies
- description: Read webhook configurations (webhooks are managed from the Dashboard
    UI).
  name: Webhook Configuration
- description: Automate the DGII certification process for ERPs.
  name: Automated Certification
- description: "Download accounting reports (Sent Files, Format 606) for DGII compliance."
  name: Reports
paths:
  /oauth/token:
    post:
      description: |
        Authenticates using OAuth 2.0 Client Credentials flow.
        Returns a Bearer token valid for 24 hours (86400 seconds).
        This endpoint is public — no Authorization header needed.
      operationId: getAccessToken
      requestBody:
        content:
          application/json:
            example:
              clientId: app_live_TU_CLIENT_ID
              clientSecret: sk_live_TU_CLIENT_SECRET
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                tokenType: Bearer
                expiresIn: 86400
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
          description: Token generated successfully
        "401":
          content:
            application/json:
              example:
                statusCode: 401
                message: Invalid client credentials
                error: Unauthorized
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Token missing, expired, or invalid. Call POST /oauth/token\
            \ to renew."
      security: []
      summary: Get access token (OAuth 2.0)
      tags:
      - Authentication
  /{rnc}/certificates:
    post:
      description: |
        Uploads the DGII-issued digital signing certificate for a company.
        Stored encrypted with AES-256-CBC. No download endpoint exists.
        Sandbox tip: SBX-prefixed RNCs do not require a certificate.
      operationId: uploadCertificate
      parameters:
      - description: Company RNC (9 or 11 digits). In Sandbox use SBX-prefixed values.
        explode: false
        in: path
        name: rnc
        required: true
        schema:
          example: "133190907"
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/uploadCertificate_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadCertificateResponse"
          description: Certificate uploaded successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error (400). Check the message field for details.
        "401":
          content:
            application/json:
              example:
                statusCode: 401
                message: Invalid client credentials
                error: Unauthorized
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Token missing, expired, or invalid. Call POST /oauth/token\
            \ to renew."
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The token does not have the required scope.
        "404":
          description: Company RNC not found in the system.
      security:
      - bearerAuth: []
      - oauth2:
        - certificates:upload
      summary: Upload digital certificate (P12/PFX)
      tags:
      - Digital Certificates
