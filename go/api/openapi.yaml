          example: 468a4aa1-1b80-447e-9ecb-400e39f7d798
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: "#/components/schemas/InvoiceTypeSequence"
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listTaxSequences_200_response"
          description: List of tax sequences
        "401":
          content:
            application/json:
              example:
                statusCode: 401
                message: Invalid client credentials
                error: Unauthorized
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Token missing, expired, or invalid. Call POST /oauth/token\
            \ to renew."
      security:
      - bearerAuth: []
      - oauth2:
        - sequences:read
      summary: List tax sequences
      tags:
      - Tax Sequences
    post:
      operationId: createTaxSequence
      parameters:
      - description: |
          UUID of the associated company (branch). Include ONLY when acting
          on behalf of a branch. Omit when acting as the main company.
        explode: false
        in: header
        name: x-tenant-id
        required: false
        schema:
          example: 468a4aa1-1b80-447e-9ecb-400e39f7d798
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              type: E32
              from: 1
              to: 10000
              quantity: 10000
              expiration: 2025-12-31
              environment: TesteCF
            schema:
              $ref: "#/components/schemas/CreateTaxSequenceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createTaxSequence_201_response"
          description: Sequence created successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error (400). Check the message field for details.
        "401":
          content:
            application/json:
              example:
                statusCode: 401
                message: Invalid client credentials
                error: Unauthorized
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Token missing, expired, or invalid. Call POST /oauth/token\
            \ to renew."
      security:
      - bearerAuth: []
      - oauth2:
        - sequences:create
      summary: Create new tax sequence
      tags:
      - Tax Sequences
