components:
  parameters:
    TenantIdHeaderOptional:
      description: |
        UUID of the associated company (branch). Include ONLY when acting
        on behalf of a branch. Omit when acting as the main company.
      explode: false
      in: header
      name: x-tenant-id
      required: false
      schema:
        example: 468a4aa1-1b80-447e-9ecb-400e39f7d798
        format: uuid
        type: string
      style: simple
    RncPath:
      description: Company RNC (9 or 11 digits). In Sandbox use SBX-prefixed values.
      explode: false
      in: path
      name: rnc
      required: true
      schema:
        example: "133190907"
        type: string
      style: simple
  responses:
    UnauthorizedError:
      content:
        application/json:
          example:
            statusCode: 401
            message: Invalid client credentials
            error: Unauthorized
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: "Token missing, expired, or invalid. Call POST /oauth/token to\
        \ renew."
    ValidationError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Validation error (400). Check the message field for details.
    ForbiddenError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: The token does not have the required scope.
    RateLimitError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RateLimitErrorResponse"
      description: Rate limit exceeded. Retry after indicated seconds.
  schemas:
    Environment:
      description: "TesteCF=testing no DGII, CerteCF=official certification, eCF=production"
      enum:
      - TesteCF
      - CerteCF
      - eCF
      type: string
    InvoiceType:
      description: |
        31=Factura Credito Fiscal, 32=Factura Consumo, 33=Nota Debito,
        34=Nota Credito, 41=Compras, 43=Gastos Menores,
        44=Regimenes Especiales, 45=Gubernamental, 46=Exportaciones, 47=Pagos Exterior
      enum:
      - "31"
      - "32"
      - "33"
      - "34"
      - "41"
      - "43"
      - "44"
      - "45"
      - "46"
      - "47"
      type: string
    InvoiceTypeSequence:
      description: Invoice type with E prefix — used for tax sequence endpoints.
      enum:
      - E31
      - E32
      - E33
      - E34
      - E41
      - E43
      - E44
      - E45
      - E46
      - E47
      type: string
    PaymentMethod:
      description: "1=Cash, 2=Check, 3=Card, 4=Credit, 5=Transfer, 6=Electronic, 7=Bond,\
        \ 8=Other"
      enum:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      - "7"
      - "8"
      type: string
    BillingIndicator:
      description: "0=Non-billable, 1=18% ITBIS, 2=16% ITBIS, 3=0% ITBIS, 4=Exempt"
      enum:
      - "0"
      - "1"
      - "2"
      - "3"
      - "4"
      type: string
    WebhookEventType:
